# =====================================================
# GitHub Actions Workflow
# Project: React Application CI Pipeline
# Author: Prof. Swapnil Pawar
# =====================================================

# Name of the workflow displayed in the GitHub Actions tab
name: React CI

# -----------------------------------------------------
# Trigger Events
# This workflow runs automatically when:
# 1. Code is pushed to the main branch
# 2. A Pull Request is created or updated for the main branch
# -----------------------------------------------------
on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

# -----------------------------------------------------
# Jobs Section
# A workflow can contain multiple jobs.
# Here we define one job called "build".
# -----------------------------------------------------
jobs:

  build:

    # Specify the operating system for the GitHub-hosted runner.
    # Ubuntu is the most commonly used runner.
    runs-on: ubuntu-latest

    # -------------------------------------------------
    # Steps executed sequentially.
    # Each step performs one task.
    # -------------------------------------------------
    steps:

      # ---------------------------------------------
      # Step 1: Checkout Source Code
      # Downloads the repository code from GitHub
      # to the virtual machine (runner).
      # Without this step, the runner has no project files.
      # ---------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ---------------------------------------------
      # Step 2: Install Node.js
      # Installs Node.js version 20 on the runner.
      # This is required to execute npm commands.
      # ---------------------------------------------
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ---------------------------------------------
      # Step 3: Install Project Dependencies
      # Reads package.json and installs all required
      # libraries into the node_modules folder.
      # ---------------------------------------------
      - name: Install Packages
        run: npm install

      # ---------------------------------------------
      # Step 4: Build the React Application
      # Executes the build script defined in package.json.
      #
      # Example:
      # "build": "vite build"
      #
      # Output is generated inside the "dist" folder.
      # If there are syntax errors, this step fails.
      # ---------------------------------------------
      - name: Build Application
        run: npm run build

      # ---------------------------------------------
      # Step 5: Build Docker Image
      # Uses the Dockerfile present in the repository.
      #
      # docker build
      #     -t : Assign image name (tag)
      #     .  : Current directory contains Dockerfile
      #
      # Result:
      # Docker image named "react-demo"
      # ---------------------------------------------
      - name: Build Docker Image
        run: docker build -t react-demo .