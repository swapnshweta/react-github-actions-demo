name: React CI/CD

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # change the version if it shows error


      - run: npm install

      - run: npm run build

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          # updaated with Pass Token  provide access permission

      - name: Build Docker Image
        run: docker build -t shivay24/react-demo:v1 .
     # to push the image to docker hub we need to login first and then push the image
      - name: Push Docker Image
        run: docker push shivay24/react-demo:v1
        